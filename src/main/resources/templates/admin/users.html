<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ — Пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Пользователи</h2>
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">← Назад</a>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Логин</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Дата регистрации</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.email}">email</td>
                    <td>
                        <span class="badge"
                              th:classappend="${user.role == 'ADMIN'} ? 'bg-warning text-dark' : 'bg-info text-dark'"
                              th:text="${user.role}">USER</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${user.isBlocked} ? 'bg-danger' : 'bg-success'"
                              th:text="${user.isBlocked} ? 'Заблокирован' : 'Активен'">Активен</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">дата</td>
                    <td>
                        <span th:if="${user.role == 'ADMIN'}" class="text-muted small">—</span>
                        <div th:unless="${user.role == 'ADMIN'}" class="d-flex gap-1">
                            <form th:if="${!user.isBlocked}"
                                  th:action="@{/admin/users/{id}/block(id=${user.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Заблокировать пользователя?')">
                                    Заблокировать
                                </button>
                            </form>
                            <form th:if="${user.isBlocked}"
                                  th:action="@{/admin/users/{id}/unblock(id=${user.id})}" method="post">
                                <button type="submit" class="btn btn-success btn-sm">
                                    Разблокировать
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
