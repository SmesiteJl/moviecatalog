<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ — Отзывы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Отзывы (<span th:text="${#lists.size(reviews)}">0</span>)</h2>
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">← Назад</a>
    </div>

    <div th:if="${#lists.isEmpty(reviews)}" class="text-muted">Отзывов нет.</div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(reviews)}">
        <table class="table table-dark table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Фильм</th>
                    <th>Пользователь</th>
                    <th>Оценка</th>
                    <th>Комментарий</th>
                    <th>Дата</th>
                    <th>Удалить</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.id}">1</td>
                    <td>
                        <a th:href="@{/movie/{id}(id=${review.movie.tmdbId})}"
                           class="text-warning text-decoration-none"
                           th:text="${review.movie.title}">Фильм</a>
                    </td>
                    <td th:text="${review.user.username}">user</td>
                    <td>
                        <span class="badge bg-warning text-dark"
                              th:text="'★ ' + ${review.rating}">★ 8</span>
                    </td>
                    <td class="text-truncate" style="max-width: 200px;"
                        th:text="${review.comment}">Комментарий</td>
                    <td th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy')}">дата</td>
                    <td>
                        <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Удалить отзыв?')">Удалить</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
