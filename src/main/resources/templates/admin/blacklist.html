<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ — Чёрный список</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Чёрный список фильмов</h2>
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">← Назад</a>
    </div>

    <!-- Форма добавления -->
    <div class="card bg-secondary border-0 mb-4">
        <div class="card-body">
            <h5 class="card-title">Добавить фильм в чёрный список</h5>
            <p class="text-muted small">Введите TMDB ID фильма. Найти ID можно на themoviedb.org в URL фильма.</p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/blacklist/add}" method="post" class="d-flex gap-2 align-items-end">
                <div>
                    <label class="form-label">TMDB ID фильма</label>
                    <input type="number" name="tmdbId"
                           class="form-control bg-dark text-light border-secondary"
                           placeholder="Например: 550" required style="width: 200px;">
                </div>
                <button type="submit" class="btn btn-danger">
                    🚫 Добавить в чёрный список
                </button>
            </form>
        </div>
    </div>

    <!-- Список заблокированных фильмов -->
    <h5>Заблокированные фильмы (<span th:text="${#lists.size(blacklist)}">0</span>)</h5>

    <div th:if="${#lists.isEmpty(blacklist)}" class="text-muted">
        Чёрный список пуст.
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(blacklist)}">
        <div class="col-md-6 col-lg-4" th:each="item : ${blacklist}">
            <div class="card bg-secondary border-danger border">
                <div class="card-body d-flex align-items-center gap-3">
                    <img th:if="${item.movie != null and item.movie.posterPath != null}"
                         th:src="'https://image.tmdb.org/t/p/w92' + ${item.movie.posterPath}"
                         class="rounded" style="width: 46px; height: 69px; object-fit: cover;" alt="Постер">
                    <div th:unless="${item.movie != null and item.movie.posterPath != null}"
                         class="rounded bg-dark d-flex align-items-center justify-content-center"
                         style="width: 46px; height: 69px;">
                        <span class="text-muted small">—</span>
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <p class="fw-semibold text-truncate mb-1"
                           th:text="${item.movie != null} ? ${item.movie.title} : 'ID: ' + ${item.movieId}">Название</p>
                        <small class="text-muted">ID: <span th:text="${item.movieId}">0</span></small>
                    </div>
                    <form th:action="@{/admin/blacklist/remove/{id}(id=${item.movieId})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('Убрать из чёрного списка?')">
                            Убрать
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
