<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>КиноКаталог — Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">

    <!-- Герой-блок с поиском -->
    <div class="p-5 mb-4 rounded-3 hero-block text-center">
        <h1 class="display-5 fw-bold text-warning">КиноКаталог</h1>
        <p class="lead text-light mb-4">Поиск и рейтинги фильмов со всего мира</p>
        <form th:action="@{/}" method="get" class="d-flex justify-content-center gap-2">
            <input class="form-control bg-secondary text-light border-0"
                   type="search" name="q"
                   th:value="${searchQuery}"
                   placeholder="Название фильма..."
                   style="max-width: 400px;">
            <button class="btn btn-warning" type="submit">Поиск</button>
        </form>
    </div>

    <!-- Заголовок -->
    <h2 class="mb-3" th:text="${isSearch} ? 'Результаты поиска' : 'Популярные фильмы'">Популярные фильмы</h2>

    <!-- Сообщение, если ничего не найдено -->
    <div th:if="${#lists.isEmpty(movies)}" class="alert alert-secondary">
        Ничего не найдено. Попробуйте другой запрос.
    </div>

    <!-- Сетка фильмов -->
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">
        <div class="col" th:each="movie : ${movies}">
            <a th:href="@{/movie/{id}(id=${movie.id})}" class="text-decoration-none">
                <div class="card h-100 bg-secondary border-0 movie-card">
                    <div class="poster-wrapper">
                        <img th:if="${movie.posterPath != null}"
                             th:src="'https://image.tmdb.org/t/p/w342' + ${movie.posterPath}"
                             class="card-img-top poster-img" alt="Постер">
                        <div th:unless="${movie.posterPath != null}"
                             class="no-poster d-flex align-items-center justify-content-center">
                            <span class="text-muted">Нет постера</span>
                        </div>
                    </div>
                    <div class="card-body p-2">
                        <p class="card-title small fw-semibold text-light mb-1 text-truncate"
                           th:text="${movie.title}">Название</p>
                        <span class="badge bg-warning text-dark"
                              th:if="${movie.voteAverage != null and movie.voteAverage > 0}"
                              th:text="'★ ' + ${#numbers.formatDecimal(movie.voteAverage, 1, 1)}">★ 7.5</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Ссылка на каталог -->
    <div th:unless="${isSearch}" class="text-center mt-4">
        <a th:href="@{/movies}" class="btn btn-outline-warning">Смотреть весь каталог →</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
