<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>КиноКаталог — Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5 flex-grow-1 text-center">
    <h1 class="display-1 text-warning" th:text="${status != null} ? ${status} : '500'">500</h1>
    <h2 class="mb-3" th:text="${error != null} ? ${error} : 'Внутренняя ошибка сервера'">Ошибка</h2>
    <p class="text-muted" th:if="${errorMessage != null}" th:text="${errorMessage}"></p>
    <a th:href="@{/}" class="btn btn-warning mt-3">На главную</a>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
