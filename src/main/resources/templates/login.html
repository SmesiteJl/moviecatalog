<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>КиноКаталог — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-secondary border-0 shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 text-warning">Вход</h3>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    <div th:if="${param.registered}" class="alert alert-success">
                        Регистрация успешна! Войдите в аккаунт.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input type="text" name="username"
                                   class="form-control bg-dark text-light border-secondary"
                                   placeholder="Введите логин" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password"
                                   class="form-control bg-dark text-light border-secondary"
                                   placeholder="Введите пароль" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Войти</button>
                    </form>

                    <hr class="border-secondary">
                    <p class="text-center mb-0">
                        Нет аккаунта?
                        <a th:href="@{/register}" class="text-warning">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
