<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>КиноКаталог — Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">
    <h2 class="mb-4">Личный кабинет</h2>

    <div class="row g-4">
        <!-- Инфо о пользователе -->
        <div class="col-md-4">
            <div class="card bg-secondary border-0 h-100">
                <div class="card-body">
                    <div class="text-center mb-3">
                        <div class="avatar-circle mx-auto mb-2">
                            <span th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">A</span>
                        </div>
                        <h4 th:text="${user.username}">username</h4>
                    </div>
                    <hr class="border-dark">
                    <p class="mb-1"><strong>Email:</strong><br>
                        <span class="text-muted" th:text="${user.email}">email</span></p>
                    <p class="mb-1 mt-2"><strong>Роль:</strong>
                        <span class="badge" th:classappend="${user.role == 'ADMIN'} ? 'bg-warning text-dark' : 'bg-info text-dark'"
                              th:text="${user.role}">USER</span></p>
                    <p class="mb-0 mt-2"><strong>Зарегистрирован:</strong><br>
                        <span class="text-muted"
                              th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">01.01.2024</span></p>

                    <div class="mt-3 d-flex gap-2">
                        <a th:href="@{/favorites}" class="btn btn-outline-warning btn-sm flex-grow-1">
                            Избранное (<span th:text="${#lists.size(favorites)}">0</span>)
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Избранное (превью) -->
        <div class="col-md-8">
            <h5>Последние в избранном</h5>
            <div th:if="${#lists.isEmpty(favorites)}" class="text-muted mb-4">
                Список избранного пуст. Добавляйте фильмы на странице фильма.
            </div>
            <div class="row row-cols-3 row-cols-md-4 g-2 mb-4" th:unless="${#lists.isEmpty(favorites)}">
                <div class="col" th:each="movie, stat : ${favorites}" th:if="${stat.index < 8}">
                    <a th:href="@{/movie/{id}(id=${movie.tmdbId})}" class="text-decoration-none">
                        <div class="card bg-secondary border-0 movie-card">
                            <div class="poster-wrapper-small">
                                <img th:if="${movie.posterPath != null}"
                                     th:src="'https://image.tmdb.org/t/p/w185' + ${movie.posterPath}"
                                     class="card-img-top" alt="Постер"
                                     style="height: 120px; object-fit: cover;">
                                <div th:unless="${movie.posterPath != null}"
                                     class="d-flex align-items-center justify-content-center bg-dark"
                                     style="height: 120px;">
                                    <span class="text-muted small">Нет постера</span>
                                </div>
                            </div>
                            <div class="card-body p-1">
                                <p class="small text-light text-truncate mb-0"
                                   th:text="${movie.title}">Название</p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Мои отзывы -->
            <h5>Мои отзывы (<span th:text="${#lists.size(reviews)}">0</span>)</h5>
            <div th:if="${#lists.isEmpty(reviews)}" class="text-muted">
                Вы ещё не оставляли отзывов.
            </div>
            <div th:each="review : ${reviews}" class="card bg-secondary border-0 mb-2">
                <div class="card-body py-2 px-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <a th:href="@{/movie/{id}(id=${review.movie.tmdbId})}"
                               class="text-warning text-decoration-none fw-semibold"
                               th:text="${review.movie.title}">Фильм</a>
                            <span class="badge bg-warning text-dark ms-2"
                                  th:text="'★ ' + ${review.rating}">★ 8</span>
                        </div>
                        <small class="text-muted"
                               th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy')}">дата</small>
                    </div>
                    <p class="mb-0 mt-1 small text-muted"
                       th:if="${review.comment != null and !review.comment.isEmpty()}"
                       th:text="${review.comment}">Комментарий</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
