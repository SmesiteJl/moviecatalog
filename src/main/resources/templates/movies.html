<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>КиноКаталог — Каталог</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="mb-0" th:text="${isSearch} ? 'Результаты поиска' : 'Каталог фильмов'">Каталог фильмов</h2>

        <!-- Форма поиска -->
        <form th:action="@{/movies}" method="get" class="d-flex gap-2">
            <input class="form-control bg-secondary text-light border-0"
                   type="search" name="q"
                   th:value="${searchQuery}"
                   placeholder="Поиск по названию..."
                   style="width: 250px;">
            <button class="btn btn-warning btn-sm" type="submit">Найти</button>
            <a th:if="${isSearch}" th:href="@{/movies}" class="btn btn-outline-secondary btn-sm">Сбросить</a>
        </form>
    </div>

    <!-- Пустой результат -->
    <div th:if="${#lists.isEmpty(movies)}" class="alert alert-secondary">
        Фильмы не найдены.
    </div>

    <!-- Сетка фильмов -->
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">
        <div class="col" th:each="movie : ${movies}">
            <a th:href="@{/movie/{id}(id=${movie.id})}" class="text-decoration-none">
                <div class="card h-100 bg-secondary border-0 movie-card">
                    <div class="poster-wrapper">
                        <img th:if="${movie.posterPath != null}"
                             th:src="'https://image.tmdb.org/t/p/w342' + ${movie.posterPath}"
                             class="card-img-top poster-img" alt="Постер">
                        <div th:unless="${movie.posterPath != null}"
                             class="no-poster d-flex align-items-center justify-content-center">
                            <span class="text-muted small">Нет постера</span>
                        </div>
                    </div>
                    <div class="card-body p-2">
                        <p class="card-title small fw-semibold text-light mb-1 text-truncate"
                           th:text="${movie.title}">Название</p>
                        <span class="badge bg-warning text-dark"
                              th:if="${movie.voteAverage != null and movie.voteAverage > 0}"
                              th:text="'★ ' + ${#numbers.formatDecimal(movie.voteAverage, 1, 1)}">★ 7.5</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Пагинация -->
    <nav th:unless="${isSearch}" class="mt-4" aria-label="Пагинация">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                <a class="page-link bg-secondary border-secondary text-light"
                   th:href="@{/movies(page=${currentPage - 1})}">«</a>
            </li>

            <th:block th:with="start=${currentPage > 2 ? currentPage - 2 : 1}, end=${currentPage + 2 < totalPages ? currentPage + 2 : totalPages}">
                <li class="page-item" th:if="${start > 1}">
                    <a class="page-link bg-secondary border-secondary text-light" th:href="@{/movies(page=1)}">1</a>
                </li>
                <li class="page-item disabled" th:if="${start > 2}">
                    <span class="page-link bg-secondary border-secondary text-muted">…</span>
                </li>
                <li class="page-item" th:each="p : ${#numbers.sequence(start, end)}"
                    th:classappend="${p == currentPage} ? 'active'">
                    <a class="page-link bg-secondary border-secondary text-light"
                       th:classappend="${p == currentPage} ? 'bg-warning text-dark border-warning'"
                       th:href="@{/movies(page=${p})}"
                       th:text="${p}">1</a>
                </li>
                <li class="page-item disabled" th:if="${end < totalPages - 1}">
                    <span class="page-link bg-secondary border-secondary text-muted">…</span>
                </li>
                <li class="page-item" th:if="${end < totalPages}">
                    <a class="page-link bg-secondary border-secondary text-light"
                       th:href="@{/movies(page=${totalPages})}"
                       th:text="${totalPages}">500</a>
                </li>
            </th:block>

            <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                <a class="page-link bg-secondary border-secondary text-light"
                   th:href="@{/movies(page=${currentPage + 1})}">»</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
